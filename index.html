<!DOCTYPE html>
<html>
<head>
  <title>Command Generator</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #111; color: #eee; }
    textarea, input { width: 100%; margin-top: 10px; padding: 10px; background: #222; color: #eee; border: 1px solid #444; }
    button { margin-top: 15px; padding: 10px 20px; background: #00adb5; border: none; cursor: pointer; }
    pre { background: #000; padding: 15px; margin-top: 20px; overflow-x: auto; }
  </style>
</head>
<body>

<h2>Paste curl → get yt-dlp command</h2>

<textarea id="input" rows="10" placeholder="Paste curl here"></textarea>

<input type="number" id="num" placeholder="Video number">

<button onclick="convert()">Generate</button>

<pre id="output"></pre>

<script>
function convert() {
  let text = document.getElementById("input").value;
  let num = document.getElementById("num").value || "1";

  try {
    let urlMatch = text.match(/'(https:\/\/[^']+\.m3u8[^']*)'/);
    if (!urlMatch) throw "No URL found";
    let url = urlMatch[1];

    let headers = [...text.matchAll(/-H '([^:]+):\s*(.*?)'/g)];

    let headerLines = headers.map(h => 
      `  --add-header "${h[1]}: ${h[2]}" \\`
    ).join("\n");

 let result = `# Download
yt-dlp \\
${headerLines}
  -f "bv*+ba/b" \\
  --merge-output-format mp4 \\
  -o "video${num}.%(ext)s" \\
  "${url}"

# Fix timestamps
ffmpeg -fflags +genpts -avoid_negative_ts make_zero \\
  -i video${num}.mp4 \\
  -c copy video${num}_fixed.mp4`;

    document.getElementById("output").textContent = result;

  } catch (e) {
    document.getElementById("output").textContent = "❌ Error: Could not parse curl command";
  }
}
</script>

</body>
</html>
